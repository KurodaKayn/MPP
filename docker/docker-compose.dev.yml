name: mpp-dev

services:
  traefik:
    profiles:
      - gateway

  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      BACKEND_API_BASE_URL: http://backend:8080
      MPP_FRONTEND_TURBOPACK_FS_CACHE: ${MPP_FRONTEND_TURBOPACK_FS_CACHE:-true}
      PORT: "3000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    develop:
      watch:
        - action: rebuild
          path: ../frontend/package.json
        - action: rebuild
          path: ../frontend/pnpm-lock.yaml

  backend:
    build:
      target: dev
    scale: 1
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      ENABLE_DEV_SEED: "true"
      COLLAB_TOKEN_SECRET: ${COLLAB_TOKEN_SECRET:-change-me-collab-token-secret}
      COLLAB_INTERNAL_URL: ${COLLAB_INTERNAL_URL:-http://collab-service:8090}
      COLLAB_WEBSOCKET_URL_BASE: ${COLLAB_WEBSOCKET_URL_BASE:-ws://localhost:8090}
      CONTENT_PIPELINE_MEDIA_ENABLED: ${CONTENT_PIPELINE_MEDIA_ENABLED:-true}
      CONTENT_PIPELINE_DRAFTS_ENABLED: ${CONTENT_PIPELINE_DRAFTS_ENABLED:-true}
      BROWSER_WORKER_INTERNAL_TOKEN: ${BROWSER_WORKER_INTERNAL_TOKEN:-change-me-browser-worker-internal-token}
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-change-me-ai-service-internal-token}
    healthcheck:
      start_period: 120s
    volumes:
      - ../backend:/app
      - backend_go_cache:/go/pkg/mod
      - backend_go_build_cache:/root/.cache/go-build
    develop:
      watch:
        - action: rebuild
          path: ../backend/go.mod
        - action: rebuild
          path: ../backend/go.sum

  publish-worker:
    build:
      target: dev
    command:
      - air
      - --build.cmd
      - go build -o /tmp/publish-worker ./cmd/publish-worker
      - --build.entrypoint
      - /tmp/publish-worker
      - --build.exclude_dir
      - tmp,vendor
    environment:
      APP_ENV: development
      BACKEND_REQUIRE_REDIS: "true"
      ENABLE_DEV_SEED: "false"
      CONTENT_PIPELINE_MEDIA_ENABLED: ${CONTENT_PIPELINE_MEDIA_ENABLED:-true}
      CONTENT_PIPELINE_DRAFTS_ENABLED: ${CONTENT_PIPELINE_DRAFTS_ENABLED:-true}
      BROWSER_WORKER_INTERNAL_TOKEN: ${BROWSER_WORKER_INTERNAL_TOKEN:-change-me-browser-worker-internal-token}
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-change-me-ai-service-internal-token}
    volumes:
      - ../backend:/app
      - backend_go_cache:/go/pkg/mod
      - backend_go_build_cache:/root/.cache/go-build
    develop:
      watch:
        - action: rebuild
          path: ../backend/go.mod
        - action: rebuild
          path: ../backend/go.sum

  browser-worker:
    build:
      target: dev
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      APP_ENV: development
      BROWSER_WORKER_INTERNAL_TOKEN: ${BROWSER_WORKER_INTERNAL_TOKEN:-change-me-browser-worker-internal-token}
    volumes:
      - ../browser-worker:/app
      - browser_worker_go_cache:/go/pkg/mod
      - browser_worker_go_build_cache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
    develop:
      watch:
        - action: rebuild
          path: ../browser-worker/go.mod
        - action: rebuild
          path: ../browser-worker/go.sum

  ai-service:
    build:
      target: dev
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-change-me-ai-service-internal-token}
    volumes:
      - ../ai-service:/app
      - ai_service_venv:/app/.venv
      - ai_service_uv_cache:/root/.cache/uv
    develop:
      watch:
        - action: rebuild
          path: ../ai-service/pyproject.toml
        - action: rebuild
          path: ../ai-service/uv.lock

  collab-service:
    build:
      target: dev
    ports:
      - "8090:8090"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      COLLAB_PORT: "8090"
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      BACKEND_INTERNAL_URL: http://backend:8080
      COLLAB_TOKEN_SECRET: ${COLLAB_TOKEN_SECRET:-change-me-collab-token-secret}
    volumes:
      - ../collab-service:/app
      - collab_service_node_modules:/app/node_modules
      - collab_service_pnpm_store:/pnpm/store
    develop:
      watch:
        - action: rebuild
          path: ../collab-service/package.json
        - action: rebuild
          path: ../collab-service/pnpm-lock.yaml

  extension-dev:
    image: node:24-alpine
    profiles:
      - extension
    working_dir: /app
    command:
      - /bin/sh
      - -c
      - |
        corepack enable
        pnpm install --frozen-lockfile --config.confirmModulesPurge=false --store-dir /pnpm/store
        pnpm dev --host 0.0.0.0 --port ${EXTENSION_DEV_PORT:-3010}
    ports:
      - "${EXTENSION_DEV_PORT:-3010}:${EXTENSION_DEV_PORT:-3010}"
    environment:
      NODE_ENV: development
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      WXT_MANUAL_RUNNER: "true"
    volumes:
      - ../extension:/app
      - extension_node_modules:/app/node_modules
      - extension_pnpm_store:/pnpm/store

  db:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  frontend_node_modules:
  frontend_next:
  backend_go_cache:
  backend_go_build_cache:
  browser_worker_go_cache:
  browser_worker_go_build_cache:
  ai_service_venv:
  ai_service_uv_cache:
  content_pipeline_cargo_registry:
  content_pipeline_cargo_target:
  collab_service_node_modules:
  collab_service_pnpm_store:
  extension_node_modules:
  extension_pnpm_store:
