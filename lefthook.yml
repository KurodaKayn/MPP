# Lefthook configuration
# Refer to https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  commands:
    frontend-format:
      root: "frontend/"
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm format {staged_files}
      stage_fixed: true

    backend-format:
      root: "backend/"
      glob: "*.go"
      run: |
        for file in {staged_files}; do
          tmp="$(mktemp)"
          golangci-lint fmt --stdin < "$file" > "$tmp"
          mv "$tmp" "$file"
        done
      stage_fixed: true

    browser-worker-format:
      root: "browser-worker/"
      glob: "*.go"
      run: |
        for file in {staged_files}; do
          tmp="$(mktemp)"
          golangci-lint fmt --stdin < "$file" > "$tmp"
          mv "$tmp" "$file"
        done
      stage_fixed: true

    ai-service-format:
      root: "ai-service/"
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true

    extension-format:
      root: "extension/"
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm format {staged_files}
      stage_fixed: true

    collab-service-format:
      root: "collab-service/"
      glob: "*.{ts}"
      run: pnpm format {staged_files}
      stage_fixed: true

    content-pipeline-service-format:
      root: "content-pipeline-service/"
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true
