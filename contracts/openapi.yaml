openapi: 3.0.3
info:
  title: Multi-Platform Poster Shared Contract
  version: 1.0.0
  description: Shared API boundary schemas for backend, frontend, and ai-service.
paths:
  /internal/browser-sessions:
    post:
      tags:
        - browser-worker
      operationId: createBrowserWorkerSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserWorkerStartSessionRequest"
      responses:
        "201":
          description: Browser worker session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserWorkerStartSessionResponse"

  /internal/browser-sessions/{ref}:
    parameters:
      - name: ref
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - browser-worker
      operationId: getBrowserWorkerSession
      responses:
        "200":
          description: Browser worker session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserWorkerGetSessionResponse"
    delete:
      tags:
        - browser-worker
      operationId: deleteBrowserWorkerSession
      responses:
        "204":
          description: Browser worker session deleted.

  /internal/browser-sessions/{ref}/capture:
    post:
      tags:
        - browser-worker
      operationId: captureBrowserWorkerSession
      parameters:
        - name: ref
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Browser worker session captured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserWorkerCaptureSessionResponse"

  /internal/browser-sessions/{ref}/publish/douyin:
    post:
      tags:
        - browser-worker
      operationId: startBrowserWorkerDouyinPublish
      parameters:
        - name: ref
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserWorkerStartDouyinPublishRequest"
      responses:
        "202":
          description: Douyin publish script started.
components:
  schemas:
    DraftFormat:
      type: string
      enum:
        - html
        - markdown
        - text

    PublishPlatform:
      type: string
      enum:
        - douyin
        - wechat
        - x
        - zhihu

    GeneratedByType:
      type: string
      enum:
        - agent
        - system
        - user

    AdaptedAssetType:
      type: string
      enum:
        - image

    ProjectStatus:
      type: string
      enum:
        - draft
        - ready
        - publishing
        - published
        - failed

    ProjectRole:
      type: string
      enum:
        - owner
        - editor
        - viewer
      x-enum-varnames:
        - ProjectRoleOwner
        - ProjectRoleEditor
        - ProjectRoleViewer

    ProjectAccessSource:
      type: string
      enum:
        - owner
        - direct_share
        - workspace
      x-enum-varnames:
        - ProjectAccessSourceOwner
        - ProjectAccessSourceDirectShare
        - ProjectAccessSourceWorkspace

    ProjectCollaboratorRole:
      type: string
      enum:
        - editor
        - viewer
      x-enum-varnames:
        - ProjectCollaboratorRoleEditor
        - ProjectCollaboratorRoleViewer

    ProjectActivityType:
      type: string
      enum:
        - content_saved
        - comment_created
        - comment_resolved
        - collaborator_added
        - collaborator_role_changed
        - collaborator_removed
        - publish_requested
        - publish_queued
        - publish_completed
        - share_link_accepted
        - share_link_created
        - share_link_revoked
        - version_restored
      x-enum-varnames:
        - ProjectActivityTypeContentSaved
        - ProjectActivityTypeCommentCreated
        - ProjectActivityTypeCommentResolved
        - ProjectActivityTypeCollaboratorAdded
        - ProjectActivityTypeCollaboratorRoleChanged
        - ProjectActivityTypeCollaboratorRemoved
        - ProjectActivityTypePublishRequested
        - ProjectActivityTypePublishQueued
        - ProjectActivityTypePublishCompleted
        - ProjectActivityTypeShareLinkAccepted
        - ProjectActivityTypeShareLinkCreated
        - ProjectActivityTypeShareLinkRevoked
        - ProjectActivityTypeVersionRestored

    ProjectCommentStatus:
      type: string
      enum:
        - open
        - resolved
      x-enum-varnames:
        - ProjectCommentStatusOpen
        - ProjectCommentStatusResolved

    ProjectShareLinkStatus:
      type: string
      enum:
        - active
        - revoked
      x-enum-varnames:
        - ProjectShareLinkStatusActive
        - ProjectShareLinkStatusRevoked

    WorkspaceRole:
      type: string
      enum:
        - owner
        - admin
        - member
        - viewer
      x-enum-varnames:
        - WorkspaceRoleOwner
        - WorkspaceRoleAdmin
        - WorkspaceRoleMember
        - WorkspaceRoleViewer

    WorkspaceMemberRequestRole:
      type: string
      enum:
        - admin
        - member
        - viewer
      x-enum-varnames:
        - WorkspaceMemberRequestRoleAdmin
        - WorkspaceMemberRequestRoleMember
        - WorkspaceMemberRequestRoleViewer

    WorkspaceStatus:
      type: string
      enum:
        - active
        - archived
      x-enum-varnames:
        - WorkspaceStatusActive
        - WorkspaceStatusArchived

    WorkspaceActivityType:
      type: string
      enum:
        - workspace_created
        - workspace_updated
        - member_added
        - member_role_changed
        - member_removed
        - invite_created
        - invite_accepted
        - invite_revoked
      x-enum-varnames:
        - WorkspaceActivityTypeWorkspaceCreated
        - WorkspaceActivityTypeWorkspaceUpdated
        - WorkspaceActivityTypeMemberAdded
        - WorkspaceActivityTypeMemberRoleChanged
        - WorkspaceActivityTypeMemberRemoved
        - WorkspaceActivityTypeInviteCreated
        - WorkspaceActivityTypeInviteAccepted
        - WorkspaceActivityTypeInviteRevoked

    PublicationStatus:
      type: string
      enum:
        - draft
        - syncing
        - queued
        - publishing
        - succeeded
        - failed
        - cancelled

    PublishResultStatus:
      type: string
      enum:
        - error
        - failed
        - manual_required
        - queued
        - succeeded
        - publishing

    PlatformAccountStatus:
      type: string
      enum:
        - unconfigured
        - untested
        - connected
        - failed

    ConnectionTestStatus:
      type: string
      enum:
        - connected
        - failed

    RequirementStatusValue:
      type: string
      enum:
        - passed
        - warning
        - failed
        - unknown

    BrowserSessionStatus:
      type: string
      enum:
        - pending
        - ready
        - login_detected
        - capturing
        - connected
        - expired
        - failed

    CollabDocumentStatus:
      type: string
      enum:
        - active

    CollabDocumentRole:
      type: string
      enum:
        - editor
        - viewer

    BrowserWorkerSessionStatus:
      type: string
      enum:
        - ready
        - login_detected

    BrowserWorkerCookie:
      type: object
      additionalProperties: false
      required:
        - name
        - value
        - domain
        - path
        - expires
        - secure
        - httpOnly
        - sameSite
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
        expires:
          type: number
          format: double
        secure:
          type: boolean
        httpOnly:
          type: boolean
          x-go-name: HttpOnly
        sameSite:
          type: string
          x-go-name: SameSite

    BrowserWorkerDomainRule:
      type: object
      additionalProperties: false
      required:
        - host
        - match
        - schemes
        - purpose
      properties:
        host:
          type: string
        match:
          type: string
          enum:
            - exact
            - suffix
        schemes:
          type: array
          items:
            type: string
        purpose:
          type: string

    BrowserWorkerCookieRequirement:
      type: object
      additionalProperties: false
      required:
        - name
        - domain_suffixes
        - required
        - preserve
      properties:
        name:
          type: string
        domain_suffixes:
          type: array
          items:
            type: string
        required:
          type: boolean
        preserve:
          type: boolean

    BrowserWorkerViewport:
      type: object
      additionalProperties: false
      required:
        - width
        - height
      properties:
        width:
          type: integer
        height:
          type: integer

    BrowserWorkerRemoteAccountProfile:
      type: object
      additionalProperties: false
      required:
        - platform_user_id
        - username
        - avatar_url
      properties:
        platform_user_id:
          type: string
          x-go-name: PlatformUserID
        username:
          type: string
        avatar_url:
          type: string
          x-go-name: AvatarURL

    BrowserWorkerStartSessionRequest:
      type: object
      additionalProperties: false
      required:
        - session_id
        - user_id
        - platform
        - login_url
        - allowed_domains
        - required_cookies
        - initial_cookies
        - ttl_seconds
        - viewport
      properties:
        session_id:
          type: string
          format: uuid
          x-go-name: SessionID
        user_id:
          type: string
          format: uuid
          x-go-name: UserID
        platform:
          type: string
        login_url:
          type: string
          x-go-name: LoginURL
        allowed_domains:
          type: array
          items:
            $ref: "#/components/schemas/BrowserWorkerDomainRule"
        required_cookies:
          type: array
          items:
            $ref: "#/components/schemas/BrowserWorkerCookieRequirement"
        initial_cookies:
          type: array
          items:
            $ref: "#/components/schemas/BrowserWorkerCookie"
        ttl_seconds:
          type: integer
          x-go-name: TTLSeconds
        viewport:
          $ref: "#/components/schemas/BrowserWorkerViewport"

    BrowserWorkerStartSessionResponse:
      type: object
      additionalProperties: false
      required:
        - worker_session_ref
        - status
        - container_id
        - cdp_endpoint_ref
        - stream_endpoint_ref
        - started_at
        - expires_at
      properties:
        worker_session_ref:
          type: string
          x-go-name: WorkerSessionRef
        status:
          $ref: "#/components/schemas/BrowserWorkerSessionStatus"
        container_id:
          type: string
          x-go-name: ContainerID
        cdp_endpoint_ref:
          type: string
          x-go-name: CDPEndpointRef
        stream_endpoint_ref:
          type: string
          x-go-name: StreamEndpointRef
        started_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    BrowserWorkerGetSessionResponse:
      type: object
      additionalProperties: false
      required:
        - worker_session_ref
        - status
        - current_url
        - login_detected
        - missing_cookies
        - message
      properties:
        worker_session_ref:
          type: string
          x-go-name: WorkerSessionRef
        status:
          $ref: "#/components/schemas/BrowserWorkerSessionStatus"
        current_url:
          type: string
          x-go-name: CurrentURL
        login_detected:
          type: boolean
          x-go-name: LoginDetected
        missing_cookies:
          type: array
          items:
            type: string
        message:
          type: string

    BrowserWorkerCaptureSessionResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - cookies
        - missing_cookies
        - account
      properties:
        status:
          $ref: "#/components/schemas/BrowserWorkerSessionStatus"
        cookies:
          type: array
          items:
            $ref: "#/components/schemas/BrowserWorkerCookie"
        missing_cookies:
          type: array
          items:
            type: string
        account:
          $ref: "#/components/schemas/BrowserWorkerRemoteAccountProfile"

    BrowserWorkerStartDouyinPublishRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - content
        - cover_image_base64
        - cover_image_name
      properties:
        title:
          type: string
        content:
          type: string
        cover_image_base64:
          type: string
          x-go-name: CoverImageBase64
        cover_image_name:
          type: string
          x-go-name: CoverImageName

    GeneratedBy:
      type: object
      additionalProperties: false
      required:
        - type
        - id
      properties:
        type:
          $ref: "#/components/schemas/GeneratedByType"
        id:
          type: string
          minLength: 1
        version:
          type: string
        agent_run_id:
          type: string
        instructions:
          type: string

    AdaptedAsset:
      type: object
      additionalProperties: false
      required:
        - type
        - source_url
      properties:
        type:
          $ref: "#/components/schemas/AdaptedAssetType"
        source_url:
          type: string
          minLength: 1
        alt:
          type: string

    AdaptedContent:
      type: object
      additionalProperties: false
      required:
        - format
      properties:
        schema_version:
          type: integer
          minimum: 1
        format:
          $ref: "#/components/schemas/DraftFormat"
        summary:
          type: string
        source_revision:
          type: string
          description: RFC3339 timestamp or a future revision identifier.
        generated_by:
          $ref: "#/components/schemas/GeneratedBy"
        html:
          type: string
        markdown:
          type: string
        text:
          type: string
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AdaptedAsset"

    DashboardStats:
      type: object
      additionalProperties: false
      required:
        - total_users
        - total_projects
        - total_published_publications
        - total_failed_publications
      properties:
        total_users:
          type: integer
        total_projects:
          type: integer
        total_published_publications:
          type: integer
        total_failed_publications:
          type: integer

    PublicationSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - platform
        - enabled
        - status
      properties:
        id:
          type: string
          format: uuid
        platform:
          $ref: "#/components/schemas/PublishPlatform"
        enabled:
          type: boolean
        status:
          $ref: "#/components/schemas/PublicationStatus"
        publish_url:
          type: string

    PublicationDetail:
      allOf:
        - $ref: "#/components/schemas/PublicationSummary"
        - type: object
          additionalProperties: false
          required:
            - config
            - adapted_content
            - retry_count
            - created_at
            - updated_at
          properties:
            error_message:
              type: string
            config:
              type: object
              additionalProperties: true
            adapted_content:
              $ref: "#/components/schemas/AdaptedContent"
            remote_id:
              type: string
            retry_count:
              type: integer
            last_attempt_at:
              type: string
              format: date-time
            published_at:
              type: string
              format: date-time
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    ProjectPublications:
      type: object
      additionalProperties: false
      required:
        - project_id
        - items
      properties:
        project_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicationDetail"

    CreateCollabDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1

    UpdateCollabDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1

    CollabSessionLimits:
      type: object
      additionalProperties: false
      required:
        - max_message_bytes
        - heartbeat_seconds
      properties:
        max_message_bytes:
          type: integer
          minimum: 1
        heartbeat_seconds:
          type: integer
          minimum: 1

    CollabDocumentSession:
      type: object
      additionalProperties: false
      required:
        - document_id
        - role
        - websocket_url
        - token
        - expires_at
        - limits
      properties:
        document_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/CollabDocumentRole"
        websocket_url:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        limits:
          $ref: "#/components/schemas/CollabSessionLimits"

    CollabDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - owner_user_id
        - title
        - status
        - schema_version
        - current_seq
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: "#/components/schemas/CollabDocumentStatus"
        schema_version:
          type: integer
          minimum: 1
        current_seq:
          type: integer
          format: int64
          minimum: 0
        last_edited_by:
          type: string
          format: uuid
          nullable: true
        last_edited_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginationCollabDocuments:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - limit
        - total
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollabDocument"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    PublishResult:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/PublishResultStatus"
        job_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        platform:
          $ref: "#/components/schemas/PublishPlatform"
        queued_at:
          type: string
          format: date-time
        remote_id:
          type: string
        publish_url:
          type: string
        error_message:
          type: string
        browser_session_id:
          type: string
          format: uuid
        stream_url:
          type: string

    ProjectListItem:
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - title
        - status
        - role
        - created_at
        - updated_at
        - publications
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
          nullable: true
        collab_document_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        role:
          $ref: "#/components/schemas/ProjectRole"
        access_source:
          $ref: "#/components/schemas/ProjectAccessSource"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        publications:
          type: array
          items:
            $ref: "#/components/schemas/PublicationSummary"

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectListItem"
        - type: object
          additionalProperties: false
          required:
            - source_content
          properties:
            source_content:
              type: string

    AddProjectCollaboratorRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"

    UpdateProjectCollaboratorRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"

    ProjectCollaborator:
      type: object
      additionalProperties: false
      required:
        - project_id
        - user_id
        - username
        - email
        - role
        - created_by
        - created_at
      properties:
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ProjectCollaboratorsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectCollaborator"

    ProjectActivity:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - actor_user_id
        - actor_username
        - actor_email
        - event_type
        - metadata
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_username:
          type: string
        actor_email:
          type: string
          format: email
        target_user_id:
          type: string
          format: uuid
        target_username:
          type: string
        target_email:
          type: string
          format: email
        event_type:
          $ref: "#/components/schemas/ProjectActivityType"
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ProjectActivitiesResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectActivity"

    CreateProjectCommentRequest:
      type: object
      additionalProperties: false
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
        anchor_text:
          type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateProjectCommentRequest:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - resolved

    ProjectComment:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - author_id
        - author_username
        - author_email
        - body
        - status
        - metadata
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        author_username:
          type: string
        author_email:
          type: string
          format: email
        body:
          type: string
        anchor_text:
          type: string
        status:
          $ref: "#/components/schemas/ProjectCommentStatus"
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    ProjectCommentsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectComment"

    ProjectVersion:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - created_by
        - creator_username
        - creator_email
        - version_number
        - title
        - source
        - collab_seq
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        creator_username:
          type: string
        creator_email:
          type: string
          format: email
        version_number:
          type: integer
        title:
          type: string
        source:
          type: string
        collab_document_id:
          type: string
          format: uuid
        collab_seq:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    ProjectVersionsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectVersion"

    RestoreProjectVersionResponse:
      type: object
      additionalProperties: false
      required:
        - project
        - version
      properties:
        project:
          $ref: "#/components/schemas/ProjectDetail"
        version:
          $ref: "#/components/schemas/ProjectVersion"

    CreateProjectShareLinkRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"
        expires_at:
          type: string
          format: date-time

    ProjectShareLink:
      type: object
      additionalProperties: false
      required:
