components:
  schemas:
    CollabDocumentStatus:
      type: string
      enum:
        - active

    CollabDocumentRole:
      type: string
      enum:
        - editor
        - viewer

    CreateCollabDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1

    UpdateCollabDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1

    CollabSessionLimits:
      type: object
      additionalProperties: false
      required:
        - max_message_bytes
        - heartbeat_seconds
      properties:
        max_message_bytes:
          type: integer
          minimum: 1
        heartbeat_seconds:
          type: integer
          minimum: 1

    CollabDocumentSession:
      type: object
      additionalProperties: false
      required:
        - document_id
        - role
        - websocket_url
        - token
        - expires_at
        - limits
      properties:
        document_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/CollabDocumentRole"
        websocket_url:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        limits:
          $ref: "#/components/schemas/CollabSessionLimits"

    CollabDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - owner_user_id
        - title
        - status
        - schema_version
        - current_seq
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: "#/components/schemas/CollabDocumentStatus"
        schema_version:
          type: integer
          minimum: 1
        current_seq:
          type: integer
          format: int64
          minimum: 0
        last_edited_by:
          type: string
          format: uuid
          nullable: true
        last_edited_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginationCollabDocuments:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - limit
        - total
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollabDocument"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
