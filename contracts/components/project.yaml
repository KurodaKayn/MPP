components:
  schemas:
    ProjectStatus:
      type: string
      enum:
        - draft
        - ready
        - publishing
        - published
        - failed

    ProjectRole:
      type: string
      enum:
        - owner
        - editor
        - viewer
      x-enum-varnames:
        - ProjectRoleOwner
        - ProjectRoleEditor
        - ProjectRoleViewer

    ProjectAccessSource:
      type: string
      enum:
        - owner
        - direct_share
        - workspace
      x-enum-varnames:
        - ProjectAccessSourceOwner
        - ProjectAccessSourceDirectShare
        - ProjectAccessSourceWorkspace

    ProjectCollaboratorRole:
      type: string
      enum:
        - editor
        - viewer
      x-enum-varnames:
        - ProjectCollaboratorRoleEditor
        - ProjectCollaboratorRoleViewer

    ProjectActivityType:
      type: string
      enum:
        - content_saved
        - comment_created
        - comment_resolved
        - collaborator_added
        - collaborator_role_changed
        - collaborator_removed
        - publish_requested
        - publish_queued
        - publish_completed
        - share_link_accepted
        - share_link_created
        - share_link_revoked
        - version_restored
      x-enum-varnames:
        - ProjectActivityTypeContentSaved
        - ProjectActivityTypeCommentCreated
        - ProjectActivityTypeCommentResolved
        - ProjectActivityTypeCollaboratorAdded
        - ProjectActivityTypeCollaboratorRoleChanged
        - ProjectActivityTypeCollaboratorRemoved
        - ProjectActivityTypePublishRequested
        - ProjectActivityTypePublishQueued
        - ProjectActivityTypePublishCompleted
        - ProjectActivityTypeShareLinkAccepted
        - ProjectActivityTypeShareLinkCreated
        - ProjectActivityTypeShareLinkRevoked
        - ProjectActivityTypeVersionRestored

    ProjectCommentStatus:
      type: string
      enum:
        - open
        - resolved
      x-enum-varnames:
        - ProjectCommentStatusOpen
        - ProjectCommentStatusResolved

    ProjectShareLinkStatus:
      type: string
      enum:
        - active
        - revoked
      x-enum-varnames:
        - ProjectShareLinkStatusActive
        - ProjectShareLinkStatusRevoked

    PublicationStatus:
      type: string
      enum:
        - draft
        - syncing
        - queued
        - publishing
        - succeeded
        - failed
        - cancelled

    PublicationDraftStatus:
      type: string
      enum:
        - unsynced
        - syncing
        - ready
        - stale

    PublicationReviewStatus:
      type: string
      enum:
        - draft
        - reviewing
        - approved
        - changes_requested

    MediaAssetLibraryScope:
      type: string
      enum:
        - project
        - workspace
        - personal

    PublishResultStatus:
      type: string
      enum:
        - error
        - failed
        - manual_required
        - queued
        - succeeded
        - publishing

    DashboardStats:
      type: object
      additionalProperties: false
      required:
        - total_users
        - total_projects
        - total_published_publications
        - total_failed_publications
      properties:
        total_users:
          type: integer
        total_projects:
          type: integer
        total_published_publications:
          type: integer
        total_failed_publications:
          type: integer

    PublicationSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - platform
        - enabled
        - status
        - draft_status
        - review_status
        - sync_required
      properties:
        id:
          type: string
          format: uuid
        platform:
          $ref: "./content.yaml#/components/schemas/PublishPlatform"
        enabled:
          type: boolean
        status:
          $ref: "#/components/schemas/PublicationStatus"
        draft_status:
          $ref: "#/components/schemas/PublicationDraftStatus"
        review_status:
          $ref: "#/components/schemas/PublicationReviewStatus"
        sync_required:
          type: boolean
        publish_url:
          type: string

    PublicationDetail:
      allOf:
        - $ref: "#/components/schemas/PublicationSummary"
        - type: object
          additionalProperties: false
          required:
            - config
            - adapted_content
            - retry_count
            - created_at
            - updated_at
          properties:
            error_message:
              type: string
            config:
              type: object
              additionalProperties: true
            adapted_content:
              $ref: "./content.yaml#/components/schemas/AdaptedContent"
            remote_id:
              type: string
            retry_count:
              type: integer
            last_attempt_at:
              type: string
              format: date-time
            published_at:
              type: string
              format: date-time
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    ProjectPublications:
      type: object
      additionalProperties: false
      required:
        - project_id
        - items
      properties:
        project_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicationDetail"

    PublishResult:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/PublishResultStatus"
        job_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        platform:
          $ref: "./content.yaml#/components/schemas/PublishPlatform"
        queued_at:
          type: string
          format: date-time
        remote_id:
          type: string
        publish_url:
          type: string
        error_message:
          type: string
        browser_session_id:
          type: string
          format: uuid
        stream_url:
          type: string

    ProjectListItem:
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - title
        - status
        - role
        - created_at
        - updated_at
        - publications
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
          nullable: true
        collab_document_id:
          type: string
          format: uuid
          nullable: true
        template_id:
          type: string
          format: uuid
          nullable: true
        brand_profile_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        role:
          $ref: "#/components/schemas/ProjectRole"
        access_source:
          $ref: "#/components/schemas/ProjectAccessSource"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        publications:
          type: array
          items:
            $ref: "#/components/schemas/PublicationSummary"

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectListItem"
        - type: object
          additionalProperties: false
          required:
            - source_content
          properties:
            source_content:
              type: string
            publication_details:
              type: array
              items:
                $ref: "#/components/schemas/PublicationDetail"
            comments:
              type: array
              items:
                $ref: "#/components/schemas/ProjectComment"
            versions:
              type: array
              items:
                $ref: "#/components/schemas/ProjectVersion"
            activities:
              type: array
              items:
                $ref: "#/components/schemas/ProjectActivity"
            collaborators:
              type: array
              items:
                $ref: "#/components/schemas/ProjectCollaborator"
            share_links:
              type: array
              items:
                $ref: "#/components/schemas/ProjectShareLink"
            permission_sources:
              type: array
              items:
                $ref: "#/components/schemas/ProjectPermissionSource"

    ProjectPermissionSource:
      type: object
      additionalProperties: false
      required:
        - source
        - role
      properties:
        source:
          type: string
        role:
          type: string

    AddProjectCollaboratorRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"

    UpdateProjectCollaboratorRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"

    ProjectCollaborator:
      type: object
      additionalProperties: false
      required:
        - project_id
        - user_id
        - username
        - email
        - role
        - created_by
        - created_at
      properties:
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ProjectCollaboratorsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectCollaborator"

    ProjectActivity:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - actor_user_id
        - actor_username
        - actor_email
        - event_type
        - metadata
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_username:
          type: string
        actor_email:
          type: string
          format: email
        target_user_id:
          type: string
          format: uuid
        target_username:
          type: string
        target_email:
          type: string
          format: email
        event_type:
          $ref: "#/components/schemas/ProjectActivityType"
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ProjectActivitiesResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectActivity"

    CreateProjectCommentRequest:
      type: object
      additionalProperties: false
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
        anchor_text:
          type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateProjectCommentRequest:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - resolved

    ProjectComment:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - author_id
        - author_username
        - author_email
        - body
        - status
        - metadata
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        author_username:
          type: string
        author_email:
          type: string
          format: email
        body:
          type: string
        anchor_text:
          type: string
        status:
          $ref: "#/components/schemas/ProjectCommentStatus"
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    ProjectCommentsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectComment"

    ProjectVersion:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - created_by
        - creator_username
        - creator_email
        - version_number
        - title
        - source
        - collab_seq
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        creator_username:
          type: string
        creator_email:
          type: string
          format: email
        version_number:
          type: integer
        title:
          type: string
        source:
          type: string
        collab_document_id:
          type: string
          format: uuid
        collab_seq:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    ProjectVersionsResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectVersion"

    RestoreProjectVersionResponse:
      type: object
      additionalProperties: false
      required:
        - project
        - version
      properties:
        project:
          $ref: "#/components/schemas/ProjectDetail"
        version:
          $ref: "#/components/schemas/ProjectVersion"

    CreateProjectShareLinkRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"
        expires_at:
          type: string
          format: date-time

    ProjectShareLink:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - created_by
        - role
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ProjectCollaboratorRole"
        status:
          $ref: "#/components/schemas/ProjectShareLinkStatus"
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time

    ProjectShareLinkWithToken:
      allOf:
        - $ref: "#/components/schemas/ProjectShareLink"
        - type: object
          additionalProperties: false
          required:
            - token
            - url
          properties:
            token:
              type: string
            url:
              type: string

    ProjectShareLinksResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectShareLink"

    AcceptProjectShareLinkResponse:
      type: object
      additionalProperties: false
      required:
        - project
        - role
      properties:
        project:
          $ref: "#/components/schemas/ProjectDetail"
        role:
          $ref: "#/components/schemas/ProjectRole"

    PaginationProjects:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - limit
        - total
        - total_pages
        - has_more
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectListItem"
        cursor:
          type: string
          description: Opaque keyset cursor used for this page.
        next_cursor:
          type: string
          description: Opaque keyset cursor for the next page.
        has_more:
          type: boolean
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
