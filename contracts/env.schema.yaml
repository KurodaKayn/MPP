version: 1

profiles:
  dev:
    description: Docker Compose development environment.
    example_file: docker/.env.dev.example
    example_sections:
      - title: Database
        items:
          - name: DB_HOST
            value: db
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            value: postgres
          - name: DB_PASSWORD
            value: postgres
          - name: DB_NAME
            value: poster_db
          - name: DB_SSLMODE
            value: disable
          - name: DB_SSLROOTCERT
            value: ""
          - name: DB_MAX_OPEN_CONNS
            value: "10"
          - name: DB_MAX_IDLE_CONNS
            value: "5"
          - name: DB_CONN_MAX_LIFETIME
            value: 30m
          - name: DB_CONN_MAX_IDLE_TIME
            value: 5m
          - name: DB_SLOW_QUERY_THRESHOLD
            value: 250ms
          - comment: Optional read-replica safety thresholds. Used only when DB_READER_HOST is configured.
          - name: DB_READER_MAX_REPLICA_LAG
            value: 2s
          - name: DB_READER_LAG_CHECK_INTERVAL
            value: 5s
      - title: Redis
        items:
          - name: REDIS_ADDR
            value: redis:6379
          - comment: If your Redis instance requires a password, set it here. Otherwise, leave it blank. Both situations are supported.
          - name: REDIS_PASSWORD
            value: ""
          - name: REDIS_DB
            value: "0"
          - name: REDIS_POOL_SIZE
            value: "32"
          - name: REDIS_MIN_IDLE_CONNS
            value: "4"
          - name: REDIS_MAX_IDLE_CONNS
            value: "16"
          - name: REDIS_CONN_MAX_IDLE_TIME
            value: 30m
          - name: REDIS_CONN_MAX_LIFETIME
            value: 0s
      - title: Optional Traefik gateway in Docker dev mode
        items:
          - name: TRAEFIK_HTTP_PORT
            value: "8088"
          - name: TRAEFIK_HTTPS_PORT
            value: "8443"
          - name: TRAEFIK_LOG_LEVEL
            value: INFO
          - name: TRAEFIK_RATE_LIMIT_AVERAGE
            value: "100"
          - name: TRAEFIK_RATE_LIMIT_PERIOD
            value: 1s
          - name: TRAEFIK_RATE_LIMIT_BURST
            value: "200"
          - name: TRAEFIK_RATE_LIMIT_REDIS_ENDPOINTS
            value: redis:6379
          - name: TRAEFIK_RATE_LIMIT_REDIS_DB
            value: "0"
      - title: Observability stack ports
        items:
          - name: PROMETHEUS_PORT
            value: "9090"
          - name: LOKI_PORT
            value: "3100"
          - name: ALLOY_PORT
            value: "12345"
          - name: GRAFANA_PORT
            value: "3001"
          - name: GRAFANA_ADMIN_USER
            value: admin
          - name: GRAFANA_ADMIN_PASSWORD
            value: admin
          - name: POSTGRES_EXPORTER_IMAGE
            value: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
          - comment: Optional. Leave blank to derive from DB_HOST, DB_PORT, DB_NAME, and DB_SSLMODE.
          - name: POSTGRES_EXPORTER_DATA_SOURCE_URI
            value: ""
          - name: POSTGRES_EXPORTER_USER
            value: postgres_exporter
          - name: POSTGRES_EXPORTER_PASSWORD
            value: postgres_exporter
      - title: AI Service
        items:
          - name: AI_SERVICE_URL
            value: http://ai-service:8000
          - name: AI_SERVICE_INTERNAL_TOKEN
            value: change-me-ai-service-internal-token
          - name: LLM_PROVIDER_URL
            value: https://api.openai.com/v1
          - name: LLM_MODEL
            value: gpt-4o
          - name: LLM_PROVIDER_KEY
            value: your_llm_provider_key_here
          - name: LLM_REQUEST_TIMEOUT_SECONDS
            value: "90"
          - name: LLM_MAX_RETRIES
            value: "2"
          - name: LLM_STREAM_CHUNK_TIMEOUT_SECONDS
            value: "30"
      - title: Content Pipeline Service
        items:
          - name: CONTENT_PIPELINE_PORT
            value: "50051"
          - name: CONTENT_PIPELINE_MEDIA_ENABLED
            value: "true"
          - name: CONTENT_PIPELINE_DRAFTS_ENABLED
            value: "true"
          - name: CONTENT_PIPELINE_MEDIA_RESOLVER_URL
            value: http://backend:8080/internal/media/resolve
          - name: CONTENT_PIPELINE_INTERNAL_TOKEN
            value: change-me-content-pipeline-internal-token
      - title: R2 object storage
        items:
          - name: OBJECT_STORAGE_PROVIDER
            value: r2
          - name: R2_ACCOUNT_ID
            value: replace-with-r2-account-id
          - name: R2_ACCESS_KEY_ID
            value: replace-with-r2-access-key-id
          - name: R2_SECRET_ACCESS_KEY
            value: replace-with-r2-secret-access-key
          - name: R2_BUCKET
            value: replace-with-r2-bucket
          - name: R2_ENDPOINT
            value: https://replace-with-r2-account-id.r2.cloudflarestorage.com
          - name: R2_REGION
            value: auto
          - name: MEDIA_UPLOAD_MAX_BYTES
            value: "5242880"
          - name: MEDIA_UPLOAD_URL_TTL
            value: 10m
          - name: MEDIA_DOWNLOAD_URL_TTL
            value: 5m
          - name: MEDIA_ALLOWED_MIME_TYPES
            value: image/jpeg,image/png,image/webp,image/gif
      - title: Event archive worker
        items:
          - name: EVENT_ARCHIVE_ENABLED
            value: "false"
          - name: EVENT_ARCHIVE_INTERVAL
            value: 24h
          - name: EVENT_ARCHIVE_BATCH_SIZE
            value: "500"
          - name: EVENT_ARCHIVE_OBJECT_PREFIX
            value: archives/database
          - name: PUBLISH_EVENT_RETENTION_DAYS
            value: "180"
          - name: EXTENSION_EXECUTION_EVENT_RETENTION_DAYS
            value: "180"
          - name: PROJECT_ACTIVITY_RETENTION_DAYS
            value: "365"
          - name: WORKSPACE_ACTIVITY_RETENTION_DAYS
            value: "365"
          - name: BROWSER_SESSION_HISTORY_RETENTION_DAYS
            value: "90"
      - title: App
        items:
          - name: PORT
            value: "8080"
          - name: APP_ENV
            value: development
          - name: JWT_SECRET
            value: replace-with-a-strong-random-secret
          - name: COLLAB_TOKEN_SECRET
            value: change-me-collab-token-secret
          - name: COLLAB_INTERNAL_URL
            value: http://collab-service:8090
          - name: COLLAB_WEBSOCKET_URL_BASE
            value: ws://localhost:8090
          - name: BACKEND_API_BASE_URL
            value: http://backend:8080
          - comment: Standalone backend role. Docker Compose overrides this per service.
          - name: BACKEND_PROCESS_ROLE
            value: all
          - name: BACKEND_REQUIRE_REDIS
            value: "false"
          - name: BACKEND_API_REPLICAS
            value: "1"
          - name: APP_RATE_LIMIT_ENABLED
            value: "true"
          - name: APP_RATE_LIMIT_KEY_PREFIX
            value: mpp:ratelimit
          - comment: Generate app/internal secrets with script/secret/gen_app_secrets.py app.
          - comment: Generate self-hosted passwords with script/secret/gen_app_secrets.py infra.
          - name: COOKIE_ENCRYPTION_KEY
            value: replace-with-exactly-32-byte-secret
          - comment: Optional. Set to the browser-worker service URL, for example http://browser-worker:8081.
          - comment: Docker Compose defaults blank values to http://browser-worker:8081. Leave blank outside Compose to use the backend mock worker.
          - name: BROWSER_WORKER_URL
            value: ""
          - name: BROWSER_WORKER_INTERNAL_TOKEN
            value: change-me-browser-worker-internal-token
          - name: BROWSER_RUNTIME_IMAGE
            value: mpp-browser-runtime
          - name: BROWSER_RUNTIME_NETWORK
            value: mpp-browser-runtime
          - name: BROWSER_RUNTIME_BIND_IP
            value: 127.0.0.1
          - name: BROWSER_RUNTIME_HOST
            value: 127.0.0.1
          - name: BROWSER_SESSION_USER_CONCURRENCY_LIMIT
            value: "2"
          - name: BROWSER_SESSION_TENANT_CONCURRENCY_LIMIT
            value: "10"
          - name: BROWSER_WORKER_POOL_SIZE
            value: "4"
      - title: Local development only
        items:
          - name: ENABLE_MOCK_LOGIN
            value: "true"
          - name: ENABLE_DEV_SEED
            value: "true"
      - title: Optional browser extension dev profile
        items:
          - name: EXTENSION_DEV_PORT
            value: "3010"
          - comment: Comma-separated origins allowed to call backend APIs with cookies from the extension workbench.
          - name: EXTENSION_ALLOWED_ORIGINS
            value: http://localhost:3000
      - title: X OAuth 2.0 app
        items:
          - name: X_OAUTH2_CLIENT_ID
            value: your_x_oauth2_client_id_here
          - name: X_OAUTH2_CLIENT_SECRET
            value: your_x_oauth2_client_secret_here
          - name: X_OAUTH2_REDIRECT_URL
            value: http://127.0.0.1:3000/api/user/dashboard/settings/x/oauth2/callback
      - title: Email Service (SMTP)
        items:
          - comment: "For QQ Mail: Host=smtp.qq.com, Port=587, Password=your_authorization_code"
          - name: SMTP_HOST
            value: ""
          - name: SMTP_PORT
            value: "587"
          - name: SMTP_FROM
            value: ""
          - name: SMTP_PASSWORD
            value: ""
      - title: Public frontend origin. Also passed into the frontend image build for SEO canonical, Open Graph, sitemap, and structured-data URLs.
        items:
          - name: FRONTEND_BASE_URL
            value: http://127.0.0.1:3000
  deploy:
    description: Docker Compose deployment environment.
    example_file: docker/.env.deploy.example
    example_sections:
      - title: Database
        items:
          - name: DB_HOST
            value: db
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            value: postgres
          - name: DB_PASSWORD
            value: replace-with-a-strong-db-password
          - name: DB_NAME
            value: poster_db
          - name: DB_SSLMODE
            value: disable
          - name: DB_SSLROOTCERT
            value: ""
          - name: DB_MAX_OPEN_CONNS
            value: "10"
          - name: DB_MAX_IDLE_CONNS
            value: "5"
          - name: DB_CONN_MAX_LIFETIME
            value: 30m
          - name: DB_CONN_MAX_IDLE_TIME
            value: 5m
          - name: DB_SLOW_QUERY_THRESHOLD
            value: 250ms
          - comment: Optional read-replica safety thresholds. Used only when DB_READER_HOST is configured.
          - name: DB_READER_MAX_REPLICA_LAG
            value: 2s
          - name: DB_READER_LAG_CHECK_INTERVAL
            value: 5s
      - title: Redis
        items:
          - name: REDIS_ADDR
            value: redis:6379
          - comment: If your Redis instance requires a password, set it here. Otherwise, leave it blank. Both situations are supported.
          - name: REDIS_PASSWORD
            value: replace-with-a-strong-redis-password
          - name: REDIS_DB
            value: "0"
          - name: REDIS_POOL_SIZE
            value: "64"
          - name: REDIS_MIN_IDLE_CONNS
            value: "8"
          - name: REDIS_MAX_IDLE_CONNS
            value: "32"
          - name: REDIS_CONN_MAX_IDLE_TIME
            value: 30m
          - name: REDIS_CONN_MAX_LIFETIME
            value: 0s
      - title: Traefik gateway
        items:
          - name: TRAEFIK_HTTP_PORT
            value: "80"
          - name: TRAEFIK_HTTPS_PORT
            value: "443"
          - name: TRAEFIK_LOG_LEVEL
            value: INFO
          - name: TRAEFIK_CERT_DOMAIN
            value: your-domain.example
          - comment: Required only when using docker-compose.tls-letsencrypt.yml.
          - name: TRAEFIK_ACME_EMAIL
            value: admin@your-domain.example
          - name: TRAEFIK_ACME_CA_SERVER
            value: https://acme-v02.api.letsencrypt.org/directory
          - comment: Required only when using docker-compose.tls-manual.yml.
          - comment: This directory must contain fullchain.pem and privkey.pem.
          - name: TRAEFIK_MANUAL_CERT_DIR
            value: ./traefik/certs
          - name: TRAEFIK_RATE_LIMIT_AVERAGE
            value: "100"
          - name: TRAEFIK_RATE_LIMIT_PERIOD
            value: 1s
          - name: TRAEFIK_RATE_LIMIT_BURST
            value: "200"
          - name: TRAEFIK_RATE_LIMIT_REDIS_ENDPOINTS
            value: redis:6379
          - name: TRAEFIK_RATE_LIMIT_REDIS_DB
            value: "0"
      - title: Observability stack ports
        items:
          - name: PROMETHEUS_PORT
            value: "9090"
          - name: LOKI_PORT
            value: "3100"
          - name: ALLOY_PORT
            value: "12345"
          - name: GRAFANA_PORT
            value: "3001"
          - name: GRAFANA_ADMIN_USER
            value: admin
          - name: GRAFANA_ADMIN_PASSWORD
            value: replace-with-a-strong-grafana-password
          - name: POSTGRES_EXPORTER_IMAGE
            value: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
          - comment: Optional. Leave blank to derive from DB_HOST, DB_PORT, DB_NAME, and DB_SSLMODE.
          - comment: Use host:port/db?sslmode=verify-full&sslrootcert=/path/to/ca.crt for TLS roots; credentials stay in POSTGRES_EXPORTER_USER and POSTGRES_EXPORTER_PASSWORD.
          - name: POSTGRES_EXPORTER_DATA_SOURCE_URI
            value: ""
          - name: POSTGRES_EXPORTER_USER
            value: postgres_exporter
          - name: POSTGRES_EXPORTER_PASSWORD
            value: replace-with-a-strong-postgres-exporter-password
      - title: AI Service
        items:
          - name: AI_SERVICE_URL
            value: http://ai-service:8000
          - name: AI_SERVICE_INTERNAL_TOKEN
            value: replace-with-strong-ai-service-internal-token
          - name: LLM_PROVIDER_URL
            value: https://api.openai.com/v1
          - name: LLM_MODEL
            value: gpt-4o
          - name: LLM_PROVIDER_KEY
            value: your_llm_provider_key_here
          - name: LLM_REQUEST_TIMEOUT_SECONDS
            value: "90"
          - name: LLM_MAX_RETRIES
            value: "2"
          - name: LLM_STREAM_CHUNK_TIMEOUT_SECONDS
            value: "30"
      - title: Content Pipeline Service
        items:
          - name: CONTENT_PIPELINE_PORT
            value: "50051"
          - name: CONTENT_PIPELINE_MEDIA_ENABLED
            value: "false"
          - name: CONTENT_PIPELINE_DRAFTS_ENABLED
            value: "false"
          - name: CONTENT_PIPELINE_MEDIA_RESOLVER_URL
            value: http://backend:8080/internal/media/resolve
          - name: CONTENT_PIPELINE_INTERNAL_TOKEN
            value: replace-with-a-strong-internal-token
      - title: R2 object storage
        items:
          - name: OBJECT_STORAGE_PROVIDER
            value: r2
          - name: R2_ACCOUNT_ID
            value: replace-with-r2-account-id
          - name: R2_ACCESS_KEY_ID
            value: replace-with-r2-access-key-id
          - name: R2_SECRET_ACCESS_KEY
            value: replace-with-r2-secret-access-key
          - name: R2_BUCKET
            value: replace-with-r2-bucket
          - name: R2_ENDPOINT
            value: https://replace-with-r2-account-id.r2.cloudflarestorage.com
          - name: R2_REGION
            value: auto
          - name: MEDIA_UPLOAD_MAX_BYTES
            value: "5242880"
          - name: MEDIA_UPLOAD_URL_TTL
            value: 10m
          - name: MEDIA_DOWNLOAD_URL_TTL
            value: 5m
          - name: MEDIA_ALLOWED_MIME_TYPES
            value: image/jpeg,image/png,image/webp,image/gif
      - title: Event archive worker
        items:
          - name: EVENT_ARCHIVE_ENABLED
            value: "false"
          - name: EVENT_ARCHIVE_INTERVAL
            value: 24h
          - name: EVENT_ARCHIVE_BATCH_SIZE
            value: "500"
          - name: EVENT_ARCHIVE_OBJECT_PREFIX
            value: archives/database
          - name: PUBLISH_EVENT_RETENTION_DAYS
            value: "180"
          - name: EXTENSION_EXECUTION_EVENT_RETENTION_DAYS
            value: "180"
          - name: PROJECT_ACTIVITY_RETENTION_DAYS
            value: "365"
          - name: WORKSPACE_ACTIVITY_RETENTION_DAYS
            value: "365"
          - name: BROWSER_SESSION_HISTORY_RETENTION_DAYS
            value: "90"
      - title: App
        items:
          - name: PORT
            value: "8080"
          - name: APP_ENV
            value: production
          - name: JWT_SECRET
            value: replace-with-a-strong-random-secret
          - name: COLLAB_TOKEN_SECRET
            value: replace-with-a-strong-collab-token-secret
          - name: COLLAB_INTERNAL_URL
            value: http://collab-service:8090
          - name: COLLAB_WEBSOCKET_URL_BASE
            value: wss://your-domain.example
          - name: BACKEND_API_BASE_URL
            value: http://backend:8080
          - comment: Standalone backend role. Docker Compose overrides this per service.
          - name: BACKEND_PROCESS_ROLE
            value: all
          - name: BACKEND_REQUIRE_REDIS
            value: "true"
          - name: BACKEND_API_REPLICAS
            value: "2"
          - name: APP_RATE_LIMIT_ENABLED
            value: "true"
          - name: APP_RATE_LIMIT_KEY_PREFIX
            value: mpp:ratelimit
          - comment: Generate app/internal secrets with script/secret/gen_app_secrets.py app.
          - comment: Generate self-hosted passwords with script/secret/gen_app_secrets.py infra.
          - name: COOKIE_ENCRYPTION_KEY
            value: replace-with-exactly-32-byte-secret
          - comment: Docker Compose defaults blank values to http://browser-worker:8081.
          - name: BROWSER_WORKER_URL
            value: ""
          - name: BROWSER_WORKER_INTERNAL_TOKEN
            value: replace-with-strong-browser-worker-internal-token
          - name: BROWSER_RUNTIME_IMAGE
            value: mpp-browser-runtime
          - name: BROWSER_RUNTIME_NETWORK
            value: mpp-browser-runtime
          - name: BROWSER_RUNTIME_BIND_IP
            value: 0.0.0.0
          - name: BROWSER_RUNTIME_HOST
            value: host.docker.internal
          - name: BROWSER_SESSION_USER_CONCURRENCY_LIMIT
            value: "2"
          - name: BROWSER_SESSION_TENANT_CONCURRENCY_LIMIT
            value: "10"
          - name: BROWSER_WORKER_POOL_SIZE
            value: "4"
      - title: Local development only
        items:
          - name: ENABLE_MOCK_LOGIN
            value: "false"
          - name: ENABLE_DEV_SEED
            value: "false"
      - title: Extension
        items:
          - comment: Comma-separated extension origins allowed to call backend APIs with cookies.
          - name: EXTENSION_ALLOWED_ORIGINS
            value: chrome-extension://replace-with-extension-id
      - title: X OAuth 2.0 app
        items:
          - name: X_OAUTH2_CLIENT_ID
            value: your_x_oauth2_client_id_here
          - name: X_OAUTH2_CLIENT_SECRET
            value: your_x_oauth2_client_secret_here
          - name: X_OAUTH2_REDIRECT_URL
            value: https://your-domain.example/api/user/dashboard/settings/x/oauth2/callback
      - title: Email Service (SMTP)
        items:
          - name: SMTP_HOST
            value: ""
          - name: SMTP_PORT
            value: "587"
          - name: SMTP_FROM
            value: ""
          - name: SMTP_PASSWORD
            value: ""
      - title: Public frontend origin. Also passed into the frontend image build for SEO canonical, Open Graph, sitemap, and structured-data URLs.
        items:
          - name: FRONTEND_BASE_URL
            value: https://your-domain.example

variables:
  APP_ENV:
    category: app
    type: enum
    values: [local, dev, development, test, staging, production]
    required_in: [dev, deploy]
    services: [backend, publish-worker, frontend]
  NODE_ENV:
    category: app
    type: enum
    values: [development, test, production]
    services: [frontend, collab-service]
  PORT:
    category: app
    type: port
    required_in: [dev, deploy]
    services: [backend, publish-worker, frontend]
  FRONTEND_BASE_URL:
    category: frontend
    type: url
    required_in: [dev, deploy]
    services: [frontend]
  NEXT_PUBLIC_SITE_URL:
    category: frontend
    type: url
    services: [frontend]
  NEXT_PUBLIC_BROWSER_STREAM_BASE_URL:
    category: frontend
    type: url
    services: [frontend]
  BACKEND_API_BASE_URL:
    category: app
    type: url
    required_in: [dev, deploy]
    services: [frontend]
  BACKEND_INTERNAL_URL:
    category: app
    type: url
    services: [collab-service]
  BACKEND_PROCESS_ROLE:
    category: app
    type: enum
    values: [all, api, worker]
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  BACKEND_REQUIRE_REDIS:
    category: app
    type: boolean
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  BACKEND_API_REPLICAS:
    category: app
    type: integer
    min: 1
    required_in: [dev, deploy]
    services: [backend]
  ENABLE_MOCK_LOGIN:
    category: app
    type: boolean
    required_in: [dev, deploy]
    services: [backend, frontend]
  ENABLE_DEV_SEED:
    category: app
    type: boolean
    required_in: [dev, deploy]
    services: [backend]
  JWT_SECRET:
    category: app
    type: secret
    generator: jwt
    min_length: 16
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  COOKIE_ENCRYPTION_KEY:
    category: app
    type: secret
    generator: cookie
    exact_bytes: 32
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  APP_RATE_LIMIT_ENABLED:
    category: app
    type: boolean
    required_in: [dev, deploy]
    services: [backend]
  APP_RATE_LIMIT_KEY_PREFIX:
    category: app
    type: string
    required_in: [dev, deploy]
    services: [backend]

  DB_HOST:
    category: database
    type: string
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service, db, postgres-exporter-init]
  DB_PORT:
    category: database
    type: port
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service, db, postgres-exporter-init]
  DB_USER:
    category: database
    type: string
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service, db, postgres-exporter-init]
  DB_PASSWORD:
    category: database
    type: secret
    generator: db
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service, db, postgres-exporter-init]
  DB_NAME:
    category: database
    type: string
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service, db, postgres-exporter-init]
  DB_SSLMODE:
    category: database
    type: enum
    values: [disable, allow, prefer, require, verify-ca, verify-full]
    required_in: [dev, deploy]
    services: [backend, publish-worker, collab-service]
  DB_SSLROOTCERT:
    category: database
    type: string
    services: [backend, publish-worker, collab-service]
  DB_MAX_OPEN_CONNS:
    category: database
    type: integer
    min: 1
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  DB_MAX_IDLE_CONNS:
    category: database
    type: integer
    min: 0
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  DB_CONN_MAX_LIFETIME:
    category: database
    type: duration
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  DB_CONN_MAX_IDLE_TIME:
    category: database
    type: duration
    required_in: [dev, deploy]
    services: [backend, publish-worker]
  DB_SLOW_QUERY_THRESHOLD:
    category: database
    type: duration
