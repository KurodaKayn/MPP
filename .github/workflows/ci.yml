name: CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: changes
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash script/ci/detect-changes.sh "${{ github.event_name }}" "${PR_BASE_SHA:-}" "$GITHUB_SHA"

      - name: Setup pnpm
        if: steps.changes.outputs.node == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        if: steps.changes.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            extension/pnpm-lock.yaml
            collab-service/pnpm-lock.yaml

      - name: Setup Go
        if: steps.changes.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum
            browser-worker/go.sum
            script/kubernetes/smoke-test/go.mod

      - name: Install golangci-lint
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.browser_worker == 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Setup Python
        if: steps.changes.outputs.ai_service == 'true'
        uses: actions/setup-python@v5
        with:
          python-version-file: ai-service/.python-version

      - name: Setup uv
        if: steps.changes.outputs.ai_service == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ai-service/uv.lock

      - name: Setup Rust
        if: steps.changes.outputs.content_pipeline_service == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        if: steps.changes.outputs.content_pipeline_service == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: content-pipeline-service

      - name: Setup kubectl
        if: steps.changes.outputs.kubernetes == 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.9

      - name: Setup Ruby
        if: steps.changes.outputs.kubernetes == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install kubeconform
        if: steps.changes.outputs.kubernetes == 'true'
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.8.0

      - name: Run selected CI
        shell: bash
        env:
          CI_FRONTEND: ${{ steps.changes.outputs.frontend }}
          CI_EXTENSION: ${{ steps.changes.outputs.extension }}
          CI_BACKEND: ${{ steps.changes.outputs.backend }}
          CI_BROWSER_WORKER: ${{ steps.changes.outputs.browser_worker }}
          CI_AI_SERVICE: ${{ steps.changes.outputs.ai_service }}
          CI_COLLAB_SERVICE: ${{ steps.changes.outputs.collab_service }}
          CI_CONTENT_PIPELINE_SERVICE: ${{ steps.changes.outputs.content_pipeline_service }}
          CI_KUBERNETES: ${{ steps.changes.outputs.kubernetes }}
        run: bash script/ci/run-selected.sh
