name: CI

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      extension: ${{ steps.filter.outputs.extension }}
      backend: ${{ steps.filter.outputs.backend }}
      browser_worker: ${{ steps.filter.outputs.browser_worker }}
      ai_service: ${{ steps.filter.outputs.ai_service }}
      collab_service: ${{ steps.filter.outputs.collab_service }}
      content_pipeline_service: ${{ steps.filter.outputs.content_pipeline_service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          mark_all() {
            {
              echo "frontend=true"
              echo "extension=true"
              echo "backend=true"
              echo "browser_worker=true"
              echo "ai_service=true"
              echo "collab_service=true"
              echo "content_pipeline_service=true"
            } >> "$GITHUB_OUTPUT"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mark_all
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"

          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          echo "Changed files:"
          cat changed-files.txt

          has_changes() {
            grep -Eq "$1" changed-files.txt
          }

          mark() {
            local name="$1"
            local pattern="$2"

            if has_changes "$pattern"; then
              echo "$name=true" >> "$GITHUB_OUTPUT"
            else
              echo "$name=false" >> "$GITHUB_OUTPUT"
            fi
          }

          shared_pattern='^\.github/'
          mark frontend "^(frontend/|${shared_pattern#^})"
          mark extension "^(extension/|${shared_pattern#^})"
          mark backend "^(backend/|${shared_pattern#^})"
          mark browser_worker "^(browser-worker/|${shared_pattern#^})"
          mark ai_service "^(ai-service/|${shared_pattern#^})"
          mark collab_service "^(collab-service/|${shared_pattern#^})"
          mark content_pipeline_service "^(content-pipeline-service/|${shared_pattern#^})"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

  extension:
    name: Extension
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run compile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test:run

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        run: go test ./...

  browser_worker:
    name: Browser worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.browser_worker == 'true'
    defaults:
      run:
        working-directory: browser-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: browser-worker/go.mod
          cache-dependency-path: browser-worker/go.sum

      - name: Test
        run: go test ./...

  ai_service:
    name: AI service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ai_service == 'true'
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ai-service/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ai-service/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

  collab_service:
    name: Collab service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.collab_service == 'true'
    defaults:
      run:
        working-directory: collab-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: collab-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

  content_pipeline_service:
    name: Content pipeline service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.content_pipeline_service == 'true'
    defaults:
      run:
        working-directory: content-pipeline-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: content-pipeline-service

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend
      - extension
      - backend
      - browser_worker
      - ai_service
      - collab_service
      - content_pipeline_service
    if: always()
    steps:
      - name: Check selected jobs
        shell: bash
        run: |
          set -euo pipefail

          results=(
            "${{ needs.changes.result }}"
            "${{ needs.frontend.result }}"
            "${{ needs.extension.result }}"
            "${{ needs.backend.result }}"
            "${{ needs.browser_worker.result }}"
            "${{ needs.ai_service.result }}"
            "${{ needs.collab_service.result }}"
            "${{ needs.content_pipeline_service.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "At least one selected CI job failed or was cancelled."
              exit 1
            fi
          done

          echo "Selected CI jobs passed or were skipped."
