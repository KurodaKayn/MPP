name: AI Service CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect AI service changes
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.filter.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(ai-service/|\.github/workflows/ai-service-ci\.yml$)' changed-files.txt; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

  ai-service:
    name: AI service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true'
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ai-service/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ai-service/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

  ai-service-ci-result:
    name: AI Service CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - ai-service
    if: always()
    steps:
      - name: Check AI service CI
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "AI service change detection failed or was cancelled."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.selected }}" == "true" && "${{ needs['ai-service'].result }}" != "success" ]]; then
            echo "AI service CI was selected but did not pass."
            exit 1
          fi

          echo "AI service CI passed or was not selected."
