name: Browser Worker CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect browser worker changes
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.filter.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(browser-worker/|\.github/workflows/browser-worker-ci\.yml$)' changed-files.txt; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

  browser-worker:
    name: Browser worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true'
    defaults:
      run:
        working-directory: browser-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: browser-worker/go.mod
          cache-dependency-path: browser-worker/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: browser-worker

      - name: Test
        run: go test ./...

  browser-worker-ci-result:
    name: Browser Worker CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - browser-worker
    if: always()
    steps:
      - name: Check browser worker CI
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "Browser worker change detection failed or was cancelled."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.selected }}" == "true" && "${{ needs['browser-worker'].result }}" != "success" ]]; then
            echo "Browser worker CI was selected but did not pass."
            exit 1
          fi

          echo "Browser worker CI passed or was not selected."
