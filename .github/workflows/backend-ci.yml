name: Backend CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.filter.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(backend/|\.github/workflows/backend-ci\.yml$)' changed-files.txt; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
          args: ./...

      - name: Test
        run: go test ./...

  backend-ci-result:
    name: Backend CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend
    if: always()
    steps:
      - name: Check backend CI
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "Backend change detection failed or was cancelled."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.selected }}" == "true" && "${{ needs.backend.result }}" != "success" ]]; then
            echo "Backend CI was selected but did not pass."
            exit 1
          fi

          echo "Backend CI passed or was not selected."
