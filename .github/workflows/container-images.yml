name: Container Images

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/container-images.yml"
      - "frontend/**"
      - "backend/**"
      - "browser-worker/**"
      - "ai-service/**"
      - "content-pipeline-service/**"
      - "collab-service/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REPOSITORY_OWNER: ${{ github.repository_owner }}
  FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL || 'https://mpp.example.invalid' }}
  BACKEND_API_BASE_URL: ${{ vars.BACKEND_API_BASE_URL || 'http://backend:8080' }}

jobs:
  changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.filter.outputs.images }}
      selected: ${{ steps.filter.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect images to build
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          all_images='[{"name":"frontend","image":"mpp-frontend","context":".","file":"./frontend/Dockerfile"},{"name":"backend","image":"mpp-backend","context":"./backend","file":"./backend/Dockerfile"},{"name":"browser-worker","image":"mpp-browser-worker","context":"./browser-worker","file":"./browser-worker/Dockerfile"},{"name":"browser-runtime","image":"mpp-browser-runtime","context":"./browser-worker/runtime","file":"./browser-worker/runtime/Dockerfile"},{"name":"ai-service","image":"mpp-ai-service","context":"./ai-service","file":"./ai-service/Dockerfile"},{"name":"content-pipeline-service","image":"mpp-content-pipeline-service","context":"./content-pipeline-service","file":"./content-pipeline-service/Dockerfile"},{"name":"collab-service","image":"mpp-collab-service","context":".","file":"./collab-service/Dockerfile"}]'

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            {
              echo "selected=true"
              echo "images={\"include\":${all_images}}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^\.github/workflows/container-images\.yml$' changed-files.txt; then
            {
              echo "selected=true"
              echo "images={\"include\":${all_images}}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eq '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)$' changed-files.txt; then
            {
              echo "selected=true"
              echo "images={\"include\":${all_images}}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          images=()
          add_image() {
            images+=("$1")
          }

          if grep -Eq '^frontend/' changed-files.txt; then
            add_image '{"name":"frontend","image":"mpp-frontend","context":".","file":"./frontend/Dockerfile"}'
          fi
          if grep -Eq '^backend/' changed-files.txt; then
            add_image '{"name":"backend","image":"mpp-backend","context":"./backend","file":"./backend/Dockerfile"}'
          fi
          if grep -Eq '^browser-worker/' changed-files.txt; then
            add_image '{"name":"browser-worker","image":"mpp-browser-worker","context":"./browser-worker","file":"./browser-worker/Dockerfile"}'
            add_image '{"name":"browser-runtime","image":"mpp-browser-runtime","context":"./browser-worker/runtime","file":"./browser-worker/runtime/Dockerfile"}'
          fi
          if grep -Eq '^ai-service/' changed-files.txt; then
            add_image '{"name":"ai-service","image":"mpp-ai-service","context":"./ai-service","file":"./ai-service/Dockerfile"}'
          fi
          if grep -Eq '^content-pipeline-service/' changed-files.txt; then
            add_image '{"name":"content-pipeline-service","image":"mpp-content-pipeline-service","context":"./content-pipeline-service","file":"./content-pipeline-service/Dockerfile"}'
          fi
          if grep -Eq '^collab-service/' changed-files.txt; then
            add_image '{"name":"collab-service","image":"mpp-collab-service","context":".","file":"./collab-service/Dockerfile"}'
          fi

          if (( ${#images[@]} == 0 )); then
            {
              echo "selected=false"
              echo 'images={"include":[]}'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined="$(IFS=,; echo "${images[*]}")"
          {
            echo "selected=true"
            echo "images={\"include\":[${joined}]}"
          } >> "$GITHUB_OUTPUT"

  build-pr:
    name: Build PR ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true' && github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image-namespace
        shell: bash
        run: |
          set -euo pipefail

          owner="${REPOSITORY_OWNER,,}"
          echo "value=${REGISTRY}/${owner}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-namespace.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          build-args: |
            FRONTEND_BASE_URL=${{ env.FRONTEND_BASE_URL }}
            BACKEND_API_BASE_URL=${{ env.BACKEND_API_BASE_URL }}

  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image-namespace
        shell: bash
        run: |
          set -euo pipefail

          owner="${REPOSITORY_OWNER,,}"
          echo "value=${REGISTRY}/${owner}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-namespace.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          build-args: |
            FRONTEND_BASE_URL=${{ env.FRONTEND_BASE_URL }}
            BACKEND_API_BASE_URL=${{ env.BACKEND_API_BASE_URL }}
