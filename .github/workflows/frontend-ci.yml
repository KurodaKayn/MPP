name: Frontend CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.filter.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(frontend/|\.github/workflows/frontend-ci\.yml$)' changed-files.txt; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selected == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

  frontend-ci-result:
    name: Frontend CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend
    if: always()
    steps:
      - name: Check frontend CI
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "Frontend change detection failed or was cancelled."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.selected }}" == "true" && "${{ needs.frontend.result }}" != "success" ]]; then
            echo "Frontend CI was selected but did not pass."
            exit 1
          fi

          echo "Frontend CI passed or was not selected."
