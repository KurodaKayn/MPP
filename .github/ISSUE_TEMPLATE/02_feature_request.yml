name: Feature request
description: Suggest a product or developer workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for actionable improvements to MPP. For platform-specific publishing support or adapter changes, use the "Platform adapter request" template.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
        - label: This request describes a user or maintainer problem, not only an implementation preference.
          required: true

  - type: dropdown
    id: affected-areas
    attributes:
      label: Affected area
      description: Select every part of MPP that would be affected.
      multiple: true
      options:
        - Frontend app
        - Browser extension
        - Backend API
        - Browser worker / remote login
        - Collaboration service
        - Content pipeline service
        - AI service
        - Platform adapter
        - Contracts / OpenAPI
        - Deployment / Kubernetes
        - Documentation
        - Not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow is hard, missing, slow, unsafe, or confusing today?
      placeholder: As a creator/operator/developer, I cannot ... because ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior change.
      placeholder: Add ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds, rejected designs, or existing tools that almost solve this.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List observable outcomes that would make this complete.
      placeholder: |
        - A user can ...
        - The system preserves ...
        - Tests cover ...

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to work on this?
      options:
        - Yes, I can open a pull request.
        - Yes, but I need maintainer guidance first.
        - Not right now.
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, diagrams, user stories, links, or related issues.
