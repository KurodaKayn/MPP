services:
  traefik:
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.metrics.address=:8082
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?TRAEFIK_ACME_EMAIL must be set}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=${TRAEFIK_ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
    volumes:
      - traefik_letsencrypt:/letsencrypt

  frontend:
    labels:
      - traefik.http.routers.frontend-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend-websecure.tls.domains[0].main=${TRAEFIK_CERT_DOMAIN:?TRAEFIK_CERT_DOMAIN must be set}

  collab-service:
    labels:
      - traefik.http.routers.collab-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.collab-websecure.tls.domains[0].main=${TRAEFIK_CERT_DOMAIN:?TRAEFIK_CERT_DOMAIN must be set}

volumes:
  traefik_letsencrypt:
