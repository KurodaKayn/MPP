apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../browser-runtime-control
  - ../../app-baseline
  - ../../data-services/managed

patches:
  - path: runtime-image-patch.yaml
  - target:
      version: v1
      kind: Service
      name: postgres
      namespace: mpp-system
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres.staging.db.example.invalid
  - target:
      version: v1
      kind: Service
      name: postgres-reader
      namespace: mpp-system
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres-reader.staging.db.example.invalid
  - target:
      version: v1
      kind: Service
      name: redis
      namespace: mpp-system
    patch: |-
      - op: replace
        path: /spec/externalName
        value: redis.staging.cache.example.invalid
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: mpp-public-gateway
      namespace: mpp-system
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: mpp-managed-staging.example.invalid
      - op: replace
        path: /spec/rules/0/host
        value: mpp-managed-staging.example.invalid

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: mpp-app-config
    namespace: mpp-system
    behavior: merge
    literals:
      - APP_ENV=staging
      - DB_HOST=postgres.staging.db.example.invalid
      - DB_SSLMODE=verify-full
      - DB_READER_HOST=postgres-reader.staging.db.example.invalid
      - REDIS_ADDR=redis.staging.cache.example.invalid:6379
      - REDIS_TLS=true
      - COLLAB_WEBSOCKET_URL_BASE=wss://mpp-managed-staging.example.invalid
      - LLM_PROVIDER_URL=https://llm.staging.example.invalid/v1
      - LLM_MODEL=staging-validation-model
      - X_OAUTH2_CLIENT_ID=staging-example-x-oauth2-client-id
      - X_OAUTH2_REDIRECT_URL=https://mpp-managed-staging.example.invalid/api/user/dashboard/settings/x/oauth2/callback

secretGenerator:
  - name: mpp-app-secrets
    namespace: mpp-system
    literals:
      - JWT_SECRET=staging-example-jwt-secret
      - DB_PASSWORD=staging-example-db-password
      - REDIS_PASSWORD=staging-example-redis-password
      - COLLAB_TOKEN_SECRET=staging-example-collab-secret
      - COOKIE_ENCRYPTION_KEY=12345678901234567890123456789012
      - LLM_PROVIDER_KEY=staging-example-llm-key
      - BROWSER_WORKER_INTERNAL_TOKEN=staging-example-browser-worker-token
      - AI_SERVICE_INTERNAL_TOKEN=staging-example-ai-service-token
      - CONTENT_PIPELINE_INTERNAL_TOKEN=staging-example-content-pipeline-token
      - R2_ACCESS_KEY_ID=staging-example-r2-access-key
      - R2_SECRET_ACCESS_KEY=staging-example-r2-secret-key
      - X_OAUTH2_CLIENT_SECRET=staging-example-x-oauth2-client-secret

images:
  - name: registry.example.invalid/kurodakayn/mpp-frontend
    newName: ghcr.io/kurodakayn/mpp-frontend
    newTag: sha-0000000000000000000000000000000000000000
  - name: registry.example.invalid/kurodakayn/mpp-backend
    newName: ghcr.io/kurodakayn/mpp-backend
    newTag: sha-0000000000000000000000000000000000000000
  - name: registry.example.invalid/kurodakayn/mpp-browser-worker
    newName: ghcr.io/kurodakayn/mpp-browser-worker
    newTag: sha-0000000000000000000000000000000000000000
  - name: registry.example.invalid/kurodakayn/mpp-ai-service
    newName: ghcr.io/kurodakayn/mpp-ai-service
    newTag: sha-0000000000000000000000000000000000000000
  - name: registry.example.invalid/kurodakayn/mpp-content-pipeline-service
    newName: ghcr.io/kurodakayn/mpp-content-pipeline-service
    newTag: sha-0000000000000000000000000000000000000000
  - name: registry.example.invalid/kurodakayn/mpp-collab-service
    newName: ghcr.io/kurodakayn/mpp-collab-service
    newTag: sha-0000000000000000000000000000000000000000
