apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mpp-app-secrets
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: app-secrets
    app.kubernetes.io/part-of: mpp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: mpp-production-secrets
  target:
    name: mpp-app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: mpp
          app.kubernetes.io/component: app-secrets
          app.kubernetes.io/part-of: mpp
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: mpp/production/JWT_SECRET
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mpp/production/DB_PASSWORD
    - secretKey: COLLAB_TOKEN_SECRET
      remoteRef:
        key: mpp/production/COLLAB_TOKEN_SECRET
    - secretKey: COOKIE_ENCRYPTION_KEY
      remoteRef:
        key: mpp/production/COOKIE_ENCRYPTION_KEY
    - secretKey: LLM_PROVIDER_KEY
      remoteRef:
        key: mpp/production/LLM_PROVIDER_KEY
    - secretKey: AI_SERVICE_INTERNAL_TOKEN
      remoteRef:
        key: mpp/production/AI_SERVICE_INTERNAL_TOKEN
    - secretKey: BROWSER_WORKER_INTERNAL_TOKEN
      remoteRef:
        key: mpp/production/BROWSER_WORKER_INTERNAL_TOKEN
    - secretKey: CONTENT_PIPELINE_INTERNAL_TOKEN
      remoteRef:
        key: mpp/production/CONTENT_PIPELINE_INTERNAL_TOKEN
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: mpp/production/R2_ACCESS_KEY_ID
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: mpp/production/R2_SECRET_ACCESS_KEY
