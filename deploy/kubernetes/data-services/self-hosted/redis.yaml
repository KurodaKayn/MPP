apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: mpp
spec:
  selector:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-persistence-config
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: mpp
data:
  redis.conf: |
    dir /data
    dbfilename dump.rdb

    maxmemory 384mb
    maxmemory-policy noeviction

    timeout 0
    tcp-keepalive 300

    appendonly yes
    appendfsync everysec
    appenddirname appendonlydir
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    save 900 1
    save 300 10
    save 60 10000

    slowlog-log-slower-than 10000
    slowlog-max-len 256
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: mpp
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpp
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: mpp
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: REDIS_PASSWORD
                  optional: true
          command:
            - sh
            - -ec
          args:
            - |
              if [ -n "${REDIS_PASSWORD:-}" ]; then
                exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
              fi
              exec redis-server /usr/local/etc/redis/redis.conf
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -ec
                  - |
                    if [ -n "${REDIS_PASSWORD:-}" ]; then
                      redis-cli --no-auth-warning -a "$REDIS_PASSWORD" SHUTDOWN SAVE || true
                    else
                      redis-cli SHUTDOWN SAVE || true
                    fi
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - |
                  if [ -n "${REDIS_PASSWORD:-}" ]; then
                    redis-cli --no-auth-warning -a "$REDIS_PASSWORD" ping
                  else
                    redis-cli ping
                  fi
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - |
                  if [ -n "${REDIS_PASSWORD:-}" ]; then
                    redis-cli --no-auth-warning -a "$REDIS_PASSWORD" ping
                  else
                    redis-cli ping
                  fi
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-persistence-config
              mountPath: /usr/local/etc/redis
              readOnly: true
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-persistence-config
          configMap:
            name: redis-persistence-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app.kubernetes.io/name: mpp
          app.kubernetes.io/component: redis
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
