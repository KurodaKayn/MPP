apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-app-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: publish-worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: collab-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: pgbouncer
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: postgres-backup
      ports:
        - protocol: TCP
          port: 5432
---
