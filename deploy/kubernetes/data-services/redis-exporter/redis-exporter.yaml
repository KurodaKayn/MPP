apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis-exporter
    app.kubernetes.io/part-of: mpp
spec:
  selector:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis-exporter
    app.kubernetes.io/part-of: mpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpp
        app.kubernetes.io/component: redis-exporter
        app.kubernetes.io/part-of: mpp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 59000
        runAsGroup: 59000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.86.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://redis.mpp-system.svc.cluster.local:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: REDIS_EXPORTER_LOG_FORMAT
              value: json
            - name: REDIS_EXPORTER_PING_ON_CONNECT
              value: "true"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
