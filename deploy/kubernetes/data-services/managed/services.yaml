apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: mpp
    app.kubernetes.io/managed-by: external-provider
spec:
  type: ExternalName
  externalName: replace-with-managed-postgres-host.example.invalid
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: mpp
    app.kubernetes.io/managed-by: external-provider
spec:
  type: ExternalName
  externalName: replace-with-managed-redis-host.example.invalid
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
