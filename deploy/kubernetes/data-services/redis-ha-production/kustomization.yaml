apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../redis-ha-nonprod

patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: redis-ha-internal-access
      namespace: mpp-system
    patch: |-
      - op: add
        path: /spec/ingress/0/from/0/podSelector/matchExpressions/1/values/-
        value: redis-exporter
