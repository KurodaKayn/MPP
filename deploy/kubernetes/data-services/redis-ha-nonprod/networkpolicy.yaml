apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ha-internal-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis-ha
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mpp
      - key: app.kubernetes.io/component
        operator: In
        values:
          - redis-ha-primary
          - redis-ha-replica
          - redis-ha-sentinel
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mpp
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - redis-ha-primary
                  - redis-ha-replica
                  - redis-ha-sentinel
                  - redis
                  - backend
                  - publish-worker
                  - browser-worker
                  - collab-service
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
