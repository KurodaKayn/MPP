apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-cluster-internal-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: redis-cluster
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: redis-cluster
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mpp
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - redis-cluster
                  - redis-cluster-bootstrap
                  - redis-cluster-backup
                  - redis-cluster-exporter
                  - backend
                  - publish-worker
                  - browser-worker
                  - collab-service
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 16379
