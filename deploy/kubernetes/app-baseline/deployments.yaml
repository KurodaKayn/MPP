apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mpp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpp
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: mpp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: registry.example.invalid/kurodakayn/mpp-frontend:replace-me
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: mpp-app-config
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mpp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpp
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: mpp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: registry.example.invalid/kurodakayn/mpp-backend:replace-me
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: mpp-app-config
          env:
            - name: BACKEND_PROCESS_ROLE
              value: api
            - name: PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: COOKIE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: COOKIE_ENCRYPTION_KEY
            - name: COLLAB_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: mpp-app-secrets
                  key: COLLAB_TOKEN_SECRET
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
