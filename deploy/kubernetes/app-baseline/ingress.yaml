apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpp-public-gateway
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: mpp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - replace-with-public-host.example.invalid
      secretName: mpp-public-tls
  rules:
    - host: replace-with-public-host.example.invalid
      http:
        paths:
          - path: /collab
            pathType: Prefix
            backend:
              service:
                name: collab-service
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
