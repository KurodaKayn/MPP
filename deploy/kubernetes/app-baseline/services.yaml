apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mpp
spec:
  selector:
    app.kubernetes.io/name: mpp
