apiVersion: v1
kind: ConfigMap
metadata:
  name: mpp-app-config
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/part-of: mpp
data:
  APP_ENV: production
  NODE_ENV: production
  BACKEND_API_BASE_URL: http://backend:8080
  BACKEND_REQUIRE_REDIS: "true"
  BROWSER_WORKER_URL: http://browser-worker:8081
  AI_SERVICE_URL: http://ai-service:8000
  LLM_PROVIDER_URL: https://replace-with-llm-provider.example.invalid/v1
  LLM_MODEL: replace-with-llm-model
  CONTENT_PIPELINE_HOST: content-pipeline-service
  CONTENT_PIPELINE_PORT: "50051"
  CONTENT_PIPELINE_MEDIA_RESOLVER_URL: http://backend:8080/internal/media/resolve
  CONTENT_PIPELINE_MEDIA_OBJECT_STORE: r2
  CONTENT_PIPELINE_MEDIA_OBJECT_PREFIX: content-pipeline/processed-media
  CONTENT_PIPELINE_MEDIA_OBJECT_REF_PREFIX: mpp://content-pipeline/media/
  CONTENT_PIPELINE_MEDIA_OBJECT_RETENTION_DAYS: "7"
  COLLAB_INTERNAL_URL: http://collab-service:8090
  COLLAB_WEBSOCKET_URL_BASE: wss://replace-with-public-host.example.invalid
  COLLAB_REDIS_SYNC_ENABLED: "true"
  COLLAB_WS_PATH: /collab/documents/:documentId
  DB_HOST: replace-with-postgres-host.example.invalid
  DB_PORT: "5432"
  DB_USER: postgres
  DB_NAME: poster_db
  DB_SSLMODE: verify-full
  DB_SSLROOTCERT: ""
  DB_READER_HOST: replace-with-postgres-reader-host.example.invalid
  DB_READER_MAX_REPLICA_LAG: 2s
  DB_READER_LAG_CHECK_INTERVAL: 5s
  DB_MAX_OPEN_CONNS: "10"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: 30m
  DB_CONN_MAX_IDLE_TIME: 5m
  REDIS_ENDPOINT_MODE: direct
  REDIS_ADDR: replace-with-redis-host.example.invalid:6379
  REDIS_DB: "0"
  REDIS_TLS: "false"
  REDIS_TLS_CA_CERT: ""
  REDIS_TLS_CA_FILE: ""
  REDIS_TLS_SERVER_NAME: ""
  REDIS_SENTINEL_ADDRS: ""
  REDIS_SENTINEL_MASTER_NAME: mpp-redis-ha
  REDIS_POOL_SIZE: "64"
  REDIS_MIN_IDLE_CONNS: "8"
  REDIS_MAX_IDLE_CONNS: "32"
  REDIS_CONN_MAX_IDLE_TIME: 30m
  REDIS_CONN_MAX_LIFETIME: 0s
  OBJECT_STORAGE_PROVIDER: r2
  R2_ACCOUNT_ID: replace-with-r2-account-id
  R2_BUCKET: replace-with-r2-bucket
  R2_ENDPOINT: https://replace-with-r2-account-id.r2.cloudflarestorage.com
  R2_REGION: auto
  X_OAUTH2_CLIENT_ID: replace-with-x-oauth2-client-id
  X_OAUTH2_REDIRECT_URL: https://replace-with-public-host.example.invalid/api/user/dashboard/settings/x/oauth2/callback
  X_OAUTH2_AUTHORIZE_URL: ""
  X_OAUTH2_TOKEN_URL: ""
