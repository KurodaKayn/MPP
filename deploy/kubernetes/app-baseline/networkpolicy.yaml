apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: browser-worker-internal-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: browser-worker
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: browser-worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: publish-worker
      ports:
        - protocol: TCP
          port: 8081
