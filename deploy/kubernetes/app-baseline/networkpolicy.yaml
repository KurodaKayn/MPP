apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mpp-system-default-deny
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: network-boundary
    app.kubernetes.io/part-of: mpp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: public-frontend-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              mpp.kurodakayn.dev/public-ingress: "true"
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: public-collab-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: collab-service
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: collab-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              mpp.kurodakayn.dev/public-ingress: "true"
      ports:
        - protocol: TCP
          port: 8090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-backend-access
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpp
              app.kubernetes.io/component: content-pipeline-service
      ports:
        - protocol: TCP
          port: 8080
---
