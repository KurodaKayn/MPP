apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mpp-system
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: mpp
spec:
  type: ExternalName
  externalName: postgres.example.invalid
  ports:
    - name: postgres
      port: 5432
