apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../browser-runtime-control
  - ../../app-baseline
  - external-services.yaml

patches:
  - path: runtime-image-patch.yaml
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: mpp-public-gateway
      namespace: mpp-system
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: mpp.example.invalid
      - op: replace
        path: /spec/rules/0/host
        value: mpp.example.invalid

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: mpp-app-config
    namespace: mpp-system
    behavior: merge
    literals:
      - DB_HOST=postgres.example.invalid
      - DB_SSLMODE=verify-full
      - REDIS_ADDR=redis:6379
      - COLLAB_WEBSOCKET_URL_BASE=wss://mpp.example.invalid
      - LLM_PROVIDER_URL=https://llm.example.invalid/v1
      - LLM_MODEL=validation-model
      - R2_ACCOUNT_ID=validation-r2-account
      - R2_BUCKET=validation-r2-bucket
      - R2_ENDPOINT=https://validation-r2-account.r2.cloudflarestorage.com
      - X_OAUTH2_CLIENT_ID=validation-x-oauth2-client-id
      - X_OAUTH2_REDIRECT_URL=https://mpp.example.invalid/api/user/dashboard/settings/x/oauth2/callback

secretGenerator:
  - name: mpp-app-secrets
    namespace: mpp-system
    literals:
      - JWT_SECRET=validation-jwt-secret
      - DB_PASSWORD=validation-db-password
      - REDIS_PASSWORD=
      - COLLAB_TOKEN_SECRET=validation-collab-secret
      - COOKIE_ENCRYPTION_KEY=12345678901234567890123456789012
      - LLM_PROVIDER_KEY=validation-llm-key
      - AI_SERVICE_INTERNAL_TOKEN=validation-ai-service-token
      - BROWSER_WORKER_INTERNAL_TOKEN=validation-browser-worker-token
      - CONTENT_PIPELINE_INTERNAL_TOKEN=validation-content-pipeline-token
      - R2_ACCESS_KEY_ID=validation-r2-access-key
      - R2_SECRET_ACCESS_KEY=validation-r2-secret-key
      - X_OAUTH2_CLIENT_SECRET=validation-x-oauth2-client-secret

images:
  - name: registry.example.invalid/kurodakayn/mpp-frontend
    newTag: validation
  - name: registry.example.invalid/kurodakayn/mpp-backend
    newTag: validation
  - name: registry.example.invalid/kurodakayn/mpp-browser-worker
    newTag: validation
  - name: registry.example.invalid/kurodakayn/mpp-ai-service
    newTag: validation
  - name: registry.example.invalid/kurodakayn/mpp-content-pipeline-service
    newTag: validation
  - name: registry.example.invalid/kurodakayn/mpp-collab-service
    newTag: validation
