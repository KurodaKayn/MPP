apiVersion: v1
kind: ServiceAccount
metadata:
  name: browser-worker-runtime-manager
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: browser-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: browser-runtime-manager
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: browser-worker
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: browser-runtime-manager
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: browser-worker
subjects:
  - kind: ServiceAccount
    name: browser-worker-runtime-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: browser-runtime-manager
