apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-worker-observability-metrics
  namespace: mpp-system
  annotations:
    mpp.kurodakayn.dev/networkpolicy-layer: "l4-port-allowlist"
    mpp.kurodakayn.dev/metrics-scraper-trust: "trusted-namespace"
    mpp.kurodakayn.dev/metrics-port-scope: "shared-http-listener"
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: mpp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpp
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - backend
          - publish-worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              mpp.kurodakayn.dev/metrics-scraper: "true"
      ports:
        - protocol: TCP
          port: 8080
---
