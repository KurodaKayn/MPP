apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mpp-browser-runtime-alerts
  namespace: mpp-observability
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: mpp
spec:
  groups:
    - name: mpp.browser-runtime
      rules:
        - alert: MPPBrowserRuntimeStartupFailures
          expr: sum(rate(mpp_browser_runtime_session_starts_total{service="browser-worker",result="error"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Browser runtime startup failures are occurring
            description: browser-worker has failed to start one or more browser runtime sessions for at least 10 minutes.
        - alert: MPPBrowserRuntimeCleanupFailures
          expr: sum(rate(mpp_browser_runtime_cleanup_runs_total{service="browser-worker",result="error"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Browser runtime cleanup is failing
            description: browser-worker is unable to complete expired runtime cleanup runs.
        - alert: MPPBrowserRuntimeCleanupLagHigh
          expr: max(mpp_browser_runtime_cleanup_lag_seconds{service="browser-worker"}) > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Browser runtime cleanup lag is high
            description: The oldest runtime cleaned in recent TTL cleanup was more than five minutes past its expiration time.
    - name: mpp.service-readiness
      rules:
        - alert: MPPServiceReadinessFailures
          expr: sum by (service) (rate(mpp_http_requests_total{route=~"/ready|/api/ready",status=~"5.."}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: MPP service readiness checks are failing
            description: A Kubernetes readiness endpoint has returned 5xx responses for at least 10 minutes.
        - alert: MPPRedisDependentServiceReadinessFailures
          expr: sum by (service) (rate(mpp_http_requests_total{service=~"backend|publish-worker|browser-worker",route="/ready",status="503"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Redis-dependent service readiness checks are failing
            description: A service that requires Redis for production operation is returning readiness failures.
    - name: mpp.redis-slo
      rules:
        - alert: MPPRedisUnavailable
          expr: max(redis_up{service="redis"}) < 1 or absent(redis_up{service="redis"})
          for: 5m
          labels:
            severity: critical
            owner: platform
          annotations:
            summary: Redis exporter reports Redis unavailable
            description: redis-exporter cannot reach Redis, or Redis metrics are absent, for at least 5 minutes.
        - alert: MPPRedisLatencyP99High
          expr: max(redis_latency_percentiles_usec{service="redis",quantile="0.99"}) / 1000000 > 0.05
          for: 10m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis p99 command latency is high
            description: Redis p99 command latency reported by Redis latency histograms is above 50 ms.
        - alert: MPPRedisConnectionErrors
          expr: |
            (
              (sum(rate(redis_rejected_connections_total{service="redis"}[5m])) or vector(0))
              + (sum(rate(redis_commands_rejected_calls_total{service="redis"}[5m])) or vector(0))
              + (sum(rate(redis_commands_failed_calls_total{service="redis"}[5m])) or vector(0))
            ) > 0
          for: 10m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis connection or command errors are occurring
            description: Redis is rejecting connections, rejecting commands, or reporting failed command calls.
        - alert: MPPRedisMemoryHeadroomLow
          expr: |
            (
              (
                max(redis_memory_max_bytes{service="redis"})
                - max(redis_memory_used_bytes{service="redis"})
              )
              / max(redis_memory_max_bytes{service="redis"}) < 0.15
            )
            and max(redis_memory_max_bytes{service="redis"}) > 0
          for: 15m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis memory headroom is low
            description: Redis has less than 15% memory headroom below configured maxmemory for at least 15 minutes.
        - alert: MPPRedisUnexpectedKeyEvictions
          expr: |
            sum(rate(redis_evicted_keys_total{service="redis"}[5m])) > 0
            and on()
            max(redis_instance_info{service="redis",maxmemory_policy="noeviction"}) == 1
          for: 5m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis is evicting keys while noeviction is configured
            description: Redis key evictions are occurring even though the configured maxmemory policy is noeviction.
        - alert: MPPRedisConnectionCountHigh
          expr: |
            (
              max(redis_connected_clients{service="redis"})
              / max(redis_config_maxclients{service="redis"})
            ) > 0.8
            and max(redis_config_maxclients{service="redis"}) > 0
          for: 10m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis connection usage is high
            description: Redis connected clients are above 80% of configured maxclients.
        - alert: MPPRedisBlockedClients
          expr: max(redis_blocked_clients{service="redis"}) > 0
          for: 5m
          labels:
            severity: warning
            owner: platform
          annotations:
            summary: Redis blocked clients are present
            description: Redis has blocked clients for at least 5 minutes.
    - name: mpp.publish-worker
      rules:
        - alert: MPPPublishWorkerJobFailures
          expr: sum by (platform) (rate(mpp_publish_jobs_total{service="publish-worker",result="error"}[15m])) > 0.05
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Publish worker job failure rate is high
            description: publish-worker is returning failed publish job attempts at a sustained rate.
