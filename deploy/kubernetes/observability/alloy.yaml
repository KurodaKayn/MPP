apiVersion: v1
kind: ServiceAccount
metadata:
  name: mpp-alloy
  namespace: mpp-observability
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: mpp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mpp-alloy-pod-log-discovery
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: mpp
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mpp-alloy-pod-log-discovery
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: mpp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mpp-alloy-pod-log-discovery
subjects:
  - kind: ServiceAccount
    name: mpp-alloy
    namespace: mpp-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mpp-alloy-config
  namespace: mpp-observability
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: mpp
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "mpp_pods" {
      role = "pod"

      namespaces {
        names = ["mpp-system", "mpp-browser-runtime"]
      }
    }

    discovery.relabel "mpp_pod_logs" {
      targets = discovery.kubernetes.mpp_pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "mpp"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
        target_label  = "service"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_mpp_kurodakayn_dev_runtime_driver"]
        target_label  = "runtime_driver"
      }

      rule {
        target_label = "platform"
        replacement  = "kubernetes"
      }
    }

    loki.source.kubernetes "mpp" {
      targets    = discovery.relabel.mpp_pod_logs.output
      forward_to = [loki.process.mpp.receiver]
    }

    loki.process "mpp" {
      forward_to = [loki.write.default.receiver]

      stage.json {
        expressions = {
          service    = "service",
          trace_id   = "trace_id",
          request_id = "request_id",
          method     = "method",
          path       = "path",
          route      = "route",
          status     = "status",
          latency_ms = "latency_ms",
        }
      }

      stage.labels {
        values = {
          service = "",
        }
      }

      stage.structured_metadata {
        values = {
          trace_id   = "",
          request_id = "",
          method     = "",
          path       = "",
          route      = "",
          status     = "",
          latency_ms = "",
        }
      }
    }

    loki.write "default" {
      endpoint {
        url = sys.env("LOKI_WRITE_URL")
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpp-alloy
  namespace: mpp-observability
  labels:
    app.kubernetes.io/name: mpp
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: mpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mpp
      app.kubernetes.io/component: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpp
        app.kubernetes.io/component: alloy
        app.kubernetes.io/part-of: mpp
    spec:
      serviceAccountName: mpp-alloy
      securityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: grafana/alloy:v1.16.1
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          env:
            - name: LOKI_WRITE_URL
              value: http://loki.mpp-observability.svc.cluster.local:3100/loki/api/v1/push
          ports:
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: mpp-alloy-config
        - name: data
          emptyDir: {}
